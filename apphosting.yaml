# Firebase App Hosting config for ResumeLab (Next.js 14)
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  runtime: nodejs20
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 100

env:
  # --- Public vars (baked into Next.js bundle at build time) ---
  - variable: NEXT_PUBLIC_SUPABASE_URL
    secret: NEXT_PUBLIC_SUPABASE_URL
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SUPABASE_ANON_KEY
    secret: NEXT_PUBLIC_SUPABASE_ANON_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_URL
    secret: NEXT_PUBLIC_APP_URL
    availability:
      - BUILD
      - RUNTIME

  # --- Server-only secrets ---
  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: SUPABASE_SERVICE_ROLE_KEY
    availability:
      - RUNTIME

  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
    availability:
      - RUNTIME

  - variable: PAYPAL_CLIENT_ID
    secret: PAYPAL_CLIENT_ID
    availability:
      - RUNTIME

  - variable: PAYPAL_CLIENT_SECRET
    secret: PAYPAL_CLIENT_SECRET
    availability:
      - RUNTIME

  # --- Firebase Storage ---
  - variable: FIREBASE_PROJECT_ID
    value: scribe-61c08
    availability:
      - RUNTIME

  - variable: FIREBASE_STORAGE_BUCKET
    secret: FIREBASE_STORAGE_BUCKET
    availability:
      - RUNTIME

  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - RUNTIME

  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME
